apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2  # Will be changed to 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: myregistry/notification-service:v1.2.4  # Will be changed to v1.3.0-rc1
        ports:
        - containerPort: 8080